name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate skills
        run: |
          uvx --from skills-ref agentskills validate skills/wiki-ingest
          uvx --from skills-ref agentskills validate skills/query-writeback
          uvx --from skills-ref agentskills validate skills/wiki-lint

      - name: Run repository quality checks
        run: python scripts/check_quality.py

      - name: Run runtime commands
        run: |
          python scripts/wiki_lint.py examples/minimal-vault --fail-on p1
          python scripts/wiki_search.py examples/minimal-vault "attention transformer" --limit 2
          python scripts/wiki_writeback.py examples/minimal-vault \
            --target concepts/attention-mechanisms.md \
            --query "Why did attention become central?" \
            --body "Attention created direct token-to-token interaction paths. [[LLM-0001]]"
          python scripts/wiki_eval.py

      - name: Check setup script syntax
        run: bash -n setup.sh
